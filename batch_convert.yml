name: Batch Convert (تشغيل متعدد)

on:
  workflow_dispatch:
    inputs:
      drive_urls:
        description: 'روابط ملفات ZIP مفصولة بفاصلة (مثال: https://drive.google.com/file/d/ID1/view, https://drive.google.com/file/d/ID2/view)'
        required: true
      output_prefix:
        description: 'بادئة اسم المخرجات (مثال: mov_6-1_) → mov_6-1_01, mov_6-1_02...'
        required: true
        default: 'mov_'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
    steps:
      - name: Build matrix from URLs
        id: build_matrix
        env:
          DRIVE_URLS: ${{ inputs.drive_urls }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          python3 << 'PYEOF'
          import os, json, re

          urls_raw = os.environ["DRIVE_URLS"]
          prefix = os.environ["OUTPUT_PREFIX"]

          # فصل الروابط بفاصلة أو سطر جديد
          urls = [u.strip() for u in re.split(r'[,\n]+', urls_raw) if u.strip()]

          if not urls:
              raise SystemExit("❌ لا توجد روابط")

          files = []
          for i, url in enumerate(urls, 1):
              output_name = f"{prefix}{i:02d}"
              files.append({
                  "drive_url": url,
                  "output_name": output_name
              })

          matrix = {"include": files}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

          print(f"✅ تم تجهيز {len(files)} عملية:")
          for item in files:
              print(f"   • {item['output_name']} ← {item['drive_url'][:60]}...")
          PYEOF

  convert:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 400
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ffmpeg
          pip3 install gdown --break-system-packages
          ffmpeg -version | head -1

      - name: Download and extract WebM files
        env:
          DRIVE_URL: ${{ matrix.drive_url }}
        run: |
          echo "⬇️ تنزيل ${{ matrix.output_name }} من Google Drive..."
          FILE_ID=$(python3 -c "
          import re, os, sys
          url = os.environ['DRIVE_URL']
          m = re.search(r'/d/([a-zA-Z0-9_-]+)', url)
          if not m:
              m = re.search(r'id=([a-zA-Z0-9_-]+)', url)
          if m: print(m.group(1))
          else: sys.exit('Could not extract file ID')
          ")
          echo "📎 FILE_ID: $FILE_ID"
          gdown "$FILE_ID" -O input.zip

          echo "📦 فك الضغط..."
          mkdir -p webm_3
          unzip input.zip -d webm_3
          echo "📂 ملفات WebM:"
          find webm_3 -name "*.webm" | wc -l
          du -sh webm_3/

      - name: Run conversion script
        env:
          PYTHONUNBUFFERED: "1"
        run: python3 convert_mac.py

      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: mov_output/
          retention-days: 7
